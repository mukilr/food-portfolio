<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Chettan & Chechis — Food Portfolio</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
  <script src="dishes-data.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0f;
      font-family: 'Georgia', serif;
      overflow-x: hidden;
      overflow-y: auto;
      width: 100vw;
    }

    @media (min-width: 600px) {
      body { overflow: hidden; height: 100vh; }
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 20% 30%, rgba(180, 80, 20, 0.10) 0%, transparent 70%),
        radial-gradient(ellipse 50% 40% at 80% 70%, rgba(20, 100, 80, 0.08) 0%, transparent 70%),
        radial-gradient(ellipse 40% 60% at 50% 10%, rgba(120, 40, 160, 0.06) 0%, transparent 70%);
      pointer-events: none;
    }

    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 10;
      padding: 24px 36px 0;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
    }

    .site-title {
      color: #f5ede0;
      font-size: 1rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      opacity: 0.75;
    }

    .site-tagline {
      color: #b8956a;
      font-size: 0.68rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      margin-top: 5px;
    }

    .dish-count {
      color: #f5ede0;
      font-size: 2.2rem;
      font-weight: 300;
      opacity: 0.1;
      line-height: 1;
      text-align: right;
    }

    #canvas { width: 100vw; height: 100vh; }

    .node circle { cursor: pointer; }
    .node:hover circle {
      filter: brightness(1.3) drop-shadow(0 0 20px var(--glow));
    }

    .node text.emoji {
      font-size: 1.5em;
      dominant-baseline: central;
      text-anchor: middle;
      pointer-events: none;
      user-select: none;
    }

    .node text.label {
      fill: #f5ede0;
      font-size: 0.58rem;
      letter-spacing: 0.07em;
      dominant-baseline: central;
      text-anchor: middle;
      pointer-events: none;
      user-select: none;
      text-transform: uppercase;
      opacity: 0.8;
    }

    /* ── Modal ── */
    #modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(8px);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.28s ease;
    }
    #modal-overlay.open { opacity: 1; pointer-events: all; }

    #modal {
      background: #111018;
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 24px;
      padding: 0;
      width: min(560px, 92vw);
      max-height: 90vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      position: relative;
      transform: translateY(20px) scale(0.96);
      transition: transform 0.28s ease;
    }
    #modal-overlay.open #modal { transform: translateY(0) scale(1); }

    /* Image zone */
    .modal-img-wrap {
      width: 100%;
      height: 220px;
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
    }

    .modal-img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .modal-img-wrap .img-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(0,0,0,0.1) 0%, rgba(17,16,24,0.95) 100%);
    }

    .modal-emoji-float {
      position: absolute;
      bottom: 14px;
      right: 20px;
      font-size: 2.8rem;
      line-height: 1;
      filter: drop-shadow(0 2px 8px rgba(0,0,0,0.5));
    }

    /* Content */
    .modal-body {
      padding: 28px 36px 32px;
      overflow-y: auto;
    }

    .modal-category {
      font-size: 0.65rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #b8956a;
      margin-bottom: 8px;
    }

    .modal-title {
      font-size: 1.8rem;
      color: #f5ede0;
      font-weight: 400;
      line-height: 1.15;
      margin-bottom: 4px;
    }

    .modal-subtitle {
      font-size: 0.82rem;
      color: rgba(245,237,224,0.35);
      letter-spacing: 0.05em;
      margin-bottom: 18px;
    }

    .modal-tagline {
      font-size: 1rem;
      color: rgba(245,237,224,0.55);
      font-style: italic;
      margin-bottom: 16px;
      line-height: 1.5;
    }

    .modal-desc {
      font-size: 0.88rem;
      color: rgba(245,237,224,0.48);
      line-height: 1.8;
      margin-bottom: 22px;
    }

    .modal-meta {
      display: flex;
      gap: 20px;
      margin-bottom: 26px;
      flex-wrap: wrap;
    }

    .meta-item { display: flex; flex-direction: column; gap: 4px; }
    .meta-label {
      font-size: 0.6rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(245,237,224,0.25);
    }
    .meta-value {
      font-size: 0.82rem;
      color: rgba(245,237,224,0.7);
    }

    .modal-actions {
      display: flex;
      gap: 12px;
    }

    .read-btn {
      display: inline-block;
      padding: 11px 26px;
      border: 1px solid rgba(184,149,106,0.4);
      border-radius: 50px;
      color: #b8956a;
      font-size: 0.72rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      cursor: pointer;
      background: none;
      font-family: inherit;
      text-decoration: none;
      transition: background 0.2s, color 0.2s, border-color 0.2s;
    }
    .read-btn:hover {
      background: rgba(184,149,106,0.1);
      color: #d4ae82;
      border-color: rgba(184,149,106,0.7);
    }

    .modal-close {
      position: absolute;
      top: 14px; right: 16px;
      background: rgba(0,0,0,0.4);
      border: none;
      color: rgba(255,255,255,0.55);
      font-size: 1.1rem;
      cursor: pointer;
      padding: 6px 10px;
      border-radius: 50px;
      line-height: 1;
      z-index: 2;
      transition: color 0.15s, background 0.15s;
    }
    .modal-close:hover { color: #fff; background: rgba(0,0,0,0.6); }

    .hint {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.15);
      font-size: 0.68rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      pointer-events: none;
    }
  </style>
</head>
<body>

<header>
  <div>
    <div class="site-title">The Chettan & Chechis</div>
    <div class="site-tagline">A Kerala Kitchen</div>
  </div>
  <div class="dish-count" id="dish-count">00</div>
</header>

<svg id="canvas"></svg>

<div id="modal-overlay">
  <div id="modal">
    <button class="modal-close" id="modal-close">✕</button>
    <div class="modal-img-wrap">
      <img id="modal-img" src="" alt="" />
      <div class="img-overlay"></div>
      <div class="modal-emoji-float" id="modal-emoji"></div>
    </div>
    <div class="modal-body">
      <div class="modal-category" id="modal-category"></div>
      <div class="modal-title" id="modal-title"></div>
      <div class="modal-subtitle" id="modal-subtitle"></div>
      <div class="modal-tagline" id="modal-tagline"></div>
      <div class="modal-desc" id="modal-desc"></div>
      <div class="modal-meta">
        <div class="meta-item">
          <span class="meta-label">Difficulty</span>
          <span class="meta-value" id="modal-diff"></span>
        </div>
        <div class="meta-item">
          <span class="meta-label">Time</span>
          <span class="meta-value" id="modal-time"></span>
        </div>
        <div class="meta-item">
          <span class="meta-label">Cuisine</span>
          <span class="meta-value" id="modal-cuisine"></span>
        </div>
      </div>
      <div class="modal-actions">
        <a class="read-btn" id="read-btn" href="#">Read Full Post →</a>
      </div>
    </div>
  </div>
</div>

<div class="hint">Click any dish · Drag to rearrange</div>

<script>
const W = window.innerWidth;
const H = window.innerHeight;
const isMobile = W < 600;
const mobileScale = isMobile ? 0.6 : W < 900 ? 0.78 : 1;
const canvasH = isMobile ? Math.max(H, 1400) : H;

document.getElementById('dish-count').textContent = String(DISHES.length).padStart(2, '0');

const svg = d3.select('#canvas').attr('width', W).attr('height', canvasH);
const defs = svg.append('defs');

// Gradients
DISHES.forEach(d => {
  const grad = defs.append('radialGradient')
    .attr('id', `grad-${d.id}`)
    .attr('cx', '35%').attr('cy', '35%').attr('r', '65%');
  grad.append('stop').attr('offset', '0%')
    .attr('stop-color', d3.color(d.color).brighter(0.7));
  grad.append('stop').attr('offset', '100%')
    .attr('stop-color', d3.color(d.color).darker(1.4));
});

// Glow filter
const filt = defs.append('filter').attr('id', 'glow');
filt.append('feGaussianBlur').attr('stdDeviation', '5').attr('result', 'blur');
const fm = filt.append('feMerge');
fm.append('feMergeNode').attr('in', 'blur');
fm.append('feMergeNode').attr('in', 'SourceGraphic');

// Nodes
const nodes = DISHES.map(d => ({
  ...d,
  r: Math.round(d.r * mobileScale),
  x: W / 2 + (Math.random() - 0.5) * W * 0.65,
  y: H / 2 + (Math.random() - 0.5) * H * 0.55,
  vx: (Math.random() - 0.5) * 0.3,
  vy: (Math.random() - 0.5) * 0.3,
}));

const simulation = d3.forceSimulation(nodes)
  .force('charge', d3.forceManyBody().strength(isMobile ? -80 : -140))
  .force('center', d3.forceCenter(W / 2, canvasH / 2).strength(isMobile ? 0.12 : 0.04))
  .force('collision', d3.forceCollide().radius(d => d.r + (isMobile ? 10 : 16)).strength(0.9))
  .force('x', d3.forceX(W / 2).strength(isMobile ? 0.06 : 0.01))
  .force('y', d3.forceY(canvasH / 2).strength(isMobile ? 0.06 : 0.01))
  .alphaDecay(0)
  .velocityDecay(0.58);

const nodeGroup = svg.append('g');

const node = nodeGroup.selectAll('.node')
  .data(nodes)
  .join('g')
  .attr('class', 'node')
  .style('--glow', d => d.glow)
  .call(drag(simulation))
  .on('click', (event, d) => openModal(d));

// Outer ring
node.append('circle')
  .attr('r', d => d.r + 7)
  .attr('fill', 'none')
  .attr('stroke', d => d.color)
  .attr('stroke-width', 1)
  .attr('opacity', 0.18);

// Main circle
node.append('circle')
  .attr('r', d => d.r)
  .attr('fill', d => `url(#grad-${d.id})`)
  .attr('stroke', d => d.color)
  .attr('stroke-width', 1.5)
  .attr('stroke-opacity', 0.45)
  .attr('filter', 'url(#glow)');

// Emoji
node.append('text')
  .attr('class', 'emoji')
  .attr('dy', d => d.r < 48 ? '-0.45em' : '-0.55em')
  .text(d => d.emoji);

// Label
node.append('text')
  .attr('class', 'label')
  .attr('dy', d => d.r < 48 ? '1.05em' : '1.15em')
  .text(d => d.label);

simulation.on('tick', () => {
  node.attr('transform', d => {
    d.x = Math.max(d.r + 10, Math.min(W - d.r - 10, d.x));
    d.y = Math.max(d.r + 68, Math.min(canvasH - d.r - 36, d.y));
    return `translate(${d.x},${d.y})`;
  });
});

// Gentle drift
(function drift() {
  nodes.forEach(n => {
    n.vx += (Math.random() - 0.5) * 0.05;
    n.vy += (Math.random() - 0.5) * 0.05;
    const spd = Math.hypot(n.vx, n.vy);
    if (spd > 0.8) { n.vx *= 0.8 / spd; n.vy *= 0.8 / spd; }
  });
  simulation.alpha(Math.max(simulation.alpha(), 0.04));
  setTimeout(drift, 90);
})();

function drag(sim) {
  return d3.drag()
    .on('start', (e, d) => { if (!e.active) sim.alphaTarget(0.15).restart(); d.fx = d.x; d.fy = d.y; })
    .on('drag', (e, d) => { d.fx = e.x; d.fy = e.y; })
    .on('end', (e, d) => { if (!e.active) sim.alphaTarget(0); d.fx = null; d.fy = null; });
}

// ── Modal ──
const overlay = document.getElementById('modal-overlay');

function openModal(d) {
  document.getElementById('modal-img').src = `pics/${d.id}.jpg`;
  document.getElementById('modal-img').alt = d.title;
  document.getElementById('modal-emoji').textContent = d.emoji;
  document.getElementById('modal-category').textContent = d.category;
  document.getElementById('modal-title').textContent = d.title;
  document.getElementById('modal-subtitle').textContent = d.subtitle;
  document.getElementById('modal-tagline').textContent = `"${d.tagline}"`;
  document.getElementById('modal-desc').textContent = d.desc;
  document.getElementById('modal-diff').textContent = d.difficulty;
  document.getElementById('modal-time').textContent = d.time;
  document.getElementById('modal-cuisine').textContent = d.category.split('·')[0].trim();
  document.getElementById('read-btn').href = `dish.html?id=${d.id}`;
  overlay.classList.add('open');
}

function closeModal() { overlay.classList.remove('open'); }

document.getElementById('modal-close').addEventListener('click', closeModal);
overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

window.addEventListener('resize', () => {
  const nW = window.innerWidth, nH = window.innerHeight;
  svg.attr('width', nW).attr('height', nH);
  simulation
    .force('center', d3.forceCenter(nW / 2, nH / 2).strength(0.04))
    .force('x', d3.forceX(nW / 2).strength(0.01))
    .force('y', d3.forceY(nH / 2).strength(0.01))
    .alpha(0.3).restart();
});
</script>
</body>
</html>
